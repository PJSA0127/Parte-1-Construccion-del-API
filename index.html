<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Dashboard</title>
    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="static/css/style.css">
    <!-- Iconos y Gráficos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<nav class="navbar navbar-light bg-white py-3 mb-4 shadow-sm">
    <div class="container justify-content-center">
        <span class="navbar-brand mb-0 h1"><i class="fa-solid fa-chart-line me-2"></i>Crypto Dashboard</span>
    </div>
</nav>

<div class="container pb-5">
    
    <div class="text-center mb-5">
        <ul class="nav nav-tabs" id="cryptoTabs" role="tablist">
            <li class="nav-item">
                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#market-tab" type="button"><i class="fa-solid fa-coins me-2"></i>Mercado</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#convert-tab" type="button"><i class="fa-solid fa-calculator me-2"></i>Conversor</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#history-tab" type="button"><i class="fa-solid fa-chart-bar me-2"></i>Análisis Histórico</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#volatility-tab" type="button"><i class="fa-solid fa-bolt me-2"></i>Volatilidad</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#alerts-tab" type="button"><i class="fa-solid fa-bell me-2"></i>Alertas</button>
            </li>
        </ul>
    </div>

    <div class="tab-content mt-4">
        
        <!-- Tab: Mercado -->
        <div class="tab-pane fade show active" id="market-tab">
            <div class="row" id="crypto-list">
                <div class="text-center"><div class="spinner-border text-primary"></div></div>
            </div>
        </div>

        <!-- Tab: Conversor -->
        <div class="tab-pane fade" id="convert-tab">
            <div class="card crypto-card mx-auto" style="max-width: 500px;">
                <h4 class="mb-4 text-center">Calculadora</h4>
                <div class="mb-3">
                    <label class="form-label">Criptomoneda</label>
                    <select id="conv-id" class="form-select"></select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Cantidad</label>
                    <input type="number" id="conv-amount" class="form-control" placeholder="0.00">
                </div>
                <div class="mb-4">
                    <label class="form-label">Moneda Destino</label>
                    <select id="conv-currency" class="form-select">
                        <option value="usd">USD - Dólar Estadounidense</option>
                        <option value="eur">EUR - Euro</option>
                        <option value="cop">COP - Peso Colombiano</option>
                    </select>
                </div>
                <button class="btn btn-primary w-100" onclick="convert()">Calcular</button>
                <div id="conv-result" class="mt-4 text-center fw-bold fs-3 text-primary"></div>
            </div>
        </div>

        <!-- Tab: Historial Interactivo -->
        <div class="tab-pane fade" id="history-tab">
            <div class="card crypto-card mx-auto" style="max-width: 900px;">
                <h4 class="mb-4 text-center">Evolución de Precios (7 Días)</h4>
                <div class="row mb-4 justify-content-center">
                    <div class="col-md-6">
                        <select id="hist-id" class="form-select" onchange="getHistory()"></select>
                    </div>
                </div>
                <div style="position: relative; height:400px; width:100%">
                    <canvas id="historyChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Tab: Volatilidad -->
        <div class="tab-pane fade" id="volatility-tab">
            <div class="row">
                <div class="col-md-6">
                    <div class="card crypto-card">
                        <h4 class="text-danger mb-4"><i class="fa-solid fa-triangle-exclamation me-2"></i>Alta Volatilidad (>5%)</h4>
                        <div id="high-vol-list"></div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card crypto-card">
                        <h4 class="text-success mb-4"><i class="fa-solid fa-shield-halved me-2"></i>Baja Volatilidad (<5%)</h4>
                        <div id="low-vol-list"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab: Alertas -->
        <div class="tab-pane fade" id="alerts-tab">
            <div class="card crypto-card mx-auto" style="max-width: 500px;">
                <h4 class="mb-4 text-center">Configurar Alerta</h4>
                <div class="mb-3">
                    <label class="form-label">Correo Electrónico</label>
                    <input type="email" id="alert-email" class="form-control" placeholder="ejemplo@correo.com">
                </div>
                <div class="mb-3">
                    <label class="form-label">Criptomoneda</label>
                    <select id="alert-id" class="form-select"></select>
                </div>
                <div class="mb-4">
                    <label class="form-label">Precio Objetivo (USD)</label>
                    <input type="number" id="alert-price" class="form-control" placeholder="60000">
                </div>
                <button class="btn btn-primary w-100" onclick="createAlert()">Activar Notificación</button>
                <div id="alert-res" class="mt-3 text-center text-success fw-bold"></div>
            </div>
        </div>

    </div>
</div>

<!-- Modal de Detalles -->
<div class="modal fade" id="detailsModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 20px; border: none;">
            <div class="modal-header border-0">
                <h5 class="modal-title fw-bold" id="detail-name">Detalles de Moneda</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4 text-center" id="detail-content">
                <!-- Se llena con JS -->
                <div class="spinner-border text-primary"></div>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-secondary w-100" data-bs-dismiss="modal" style="border-radius: 12px;">Cerrar</button>
            </div>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="static/js/app.js"></script>

</body>
</html>
